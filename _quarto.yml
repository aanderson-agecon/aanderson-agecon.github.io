project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "blog/**/*.qmd"
  resources:
    - images/
    
website:
  title: "Dr. Andrew Anderson"
  site-url: "https://aanderson-agecon.github.io"
  description: "Extension Economist & Professor"
  favicon: "images/Headshot.png"

  navbar:
    background: "#3c5c3e"
    foreground: "#f5f0e6"
    left:
      - href: index.qmd
        text: About
      - href: work.qmd
        text: Research & Extension
      - href: teaching.qmd
        text: Teaching
      - href: blog/index.qmd
        text: Blog
    right:
      - icon: envelope-fill
        href: "mailto:a.anderson@usu.edu"
        aria-label: Email

  page-footer:
    background: "#3c5c3e"
    foreground: "#aabfac"
    left: "© 2026 Dr. Andrew Anderson"
    right:
      - text: "About"
        href: index.qmd
      - text: "Research & Extension"
        href: work.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Blog"
        href: blog/index.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
